name: "⚙️ Feature"
description: "Tính năng hệ thống để đáp ứng Needs"
title: "[FEAT-XX] "
labels: ["feature"]
assignees: []

body:
  - type: input
    id: feature_id
    attributes:
      label: Feature ID
      description: "Mã số định danh Feature"
      placeholder: "FEAT-01"
    validations:
      required: true

  - type: input
    id: feature_name
    attributes:
      label: Tên Feature
      placeholder: "Tìm kiếm và xem thông tin sản phẩm"
    validations:
      required: true

  - type: textarea
    id: related_needs
    attributes:
      label: Need liên quan (Origin STRQ)
      description: "Các Need mà Feature này đáp ứng"
      placeholder: "STRQ-01"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Mô tả Feature
      placeholder: |
        Cho phép khách hàng tìm kiếm và xem thông tin chi tiết sản phẩm sữa Vinamilk
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Độ ưu tiên (Priority)
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: input
    id: planned_iteration
    attributes:
      label: Planned Iteration
      description: "Sprint dự kiến thực hiện"
      placeholder: "Sprint 1"

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty (Độ khó)
      options:
        - Low
        - Medium
        - High

  - type: dropdown
    id: stability
    attributes:
      label: Stability (Độ ổn định)
      options:
        - Ổn định
        - Có thể thay đổi

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Proposed
        - In Progress
        - Implemented
        - Verified
        - Done

  
  - type: textarea
    id: rationale
    attributes:
      label: Rationale (Lý do/Business value)
      placeholder: "Tăng khả năng khám phá sản phẩm cho khách hàng"

  - type: dropdown
    id: cost
    attributes:
      label: Cost (Chi phí ước lượng)
      options:
        - Low
        - Medium
        - High
